    @keyframes float {

    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }

    .animate-fadeInUp { animation: fadeInUp 1s ease-out; }
    .animate-fadeIn { animation: fadeIn 0.5s ease-in; }
    .animate-scaleIn { animation: scaleIn 0.5s ease-out; }
    .animate-marquee { animation: marquee 30s linear infinite; }
    @keyframes pulse-slow {

      50% { opacity: 0.25; }
    }
    @keyframes float-temple {
      0%, 100% { transform: translateY(0px) scale(1); }

    .animate-pulse-slow { animation: pulse-slow 8s ease-in-out infinite; }

    .perspective { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }

                      <th className="p-2 sm:p-4 whitespace-nowrap">{t.admin.table.bull}</th>
                      <th className="p-2 sm:p-4 whitespace-nowrap">{t.admin.table.status}</th>
                      <th className="p-2 sm:p-4 text-right whitespace-nowrap">Actions</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-zinc-800 text-zinc-400 text-xs sm:text-sm">
                    {bookings.map((b) => (
                      <tr key={b.id} className="hover:bg-zinc-800/50 transition-colors">
                        <td className="p-2 sm:p-4 font-mono text-white break-all">{b.id}</td>
                        <td className="p-2 sm:p-4 break-words">{b.owner}</td>
                        <td className="p-2 sm:p-4 break-words">{b.bull}</td>
                        <td className="p-2 sm:p-4">
                          <span className={`px-1 sm:px-2 py-1 rounded text-[10px] sm:text-xs font-bold whitespace-nowrap ${
                            b.status === 'Approved' ? 'bg-green-950 text-green-400 border border-green-900' : 
                            b.status === 'Rejected' ? 'bg-red-950 text-red-400 border border-red-900' : 
                            'bg-yellow-950 text-yellow-400 border border-yellow-900'
                          }`}>
                            {b.status}
                          </span>
                        </td>
                        <td className="p-2 sm:p-4 text-right space-x-1 sm:space-x-2">
                          {b.status === 'Pending' && (
                            <>
                              <button onClick={() => updateStatus(b.id, 'Approved')} className="p-1 hover:text-green-500 text-zinc-500 transition-colors"><CheckCircle className="w-4 h-4 sm:w-[18px] sm:h-[18px]" /></button>
                              <button onClick={() => updateStatus(b.id, 'Rejected')} className="p-1 hover:text-red-500 text-zinc-500 transition-colors"><X className="w-4 h-4 sm:w-[18px] sm:h-[18px]" /></button>
                            </>
                          )}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              {bookings.length === 0 && (
                 <div className="p-6 sm:p-8 text-center text-zinc-500 text-sm sm:text-base">No bookings yet.</div>
              )}
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ThirunallurJallikattuApp />);
  </script>
</body>
</html>
